<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="./style.css" rel="stylesheet">
    <title>Lab 1: Book Log</title>
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-brand mx-auto">Cisc 3650 Book Log</a>
        </div>
    </nav> 
    
    <div class="container-fluid container-xxl mx-0 mx-md-3 mx-xxl-auto text-start w-90" >
        <div class="d-flex mt-3 mx-auto">
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search your books..." aria-label="Search"/>
            </form>
            <div class="dropdown">
                <a role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <button type="button" class="btn" data-bs-toggle="tooltip" data-bs-title="Sort">
                        <svg xmlns="http://www.w3.org/2000/svg" width="0.6em" fill="currentColor" class="bi bi-filter fs-1" viewBox="0 0 16 16">
                            <path d="M6 10.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/>
                        </svg>
                    </button>
                </a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#" data-sort="title">Sort by Title</a></li>
                    <li><a class="dropdown-item" href="#" data-sort="author">Sort by Author</a></li>
                </ul>
            </div>
            <div class="dropdown">
                <a type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <button type="button" class="btn" data-bs-toggle="tooltip" data-bs-title="Filter">
                        <svg xmlns="http://www.w3.org/2000/svg" width="0.6em" fill="currentColor" class="bi bi-funnel-fill fs-3" viewBox="0 0 16 16">
                            <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5z"/>
                        </svg> 
                    </button>
                </a>
                <ul class="dropdown-menu">
                    <li><h6 class="dropdown-header">Filter by Status</h6></li>
                    <li><a class="dropdown-item" href="#" data-filter="status" data-filter-value="Read">Read</a></li>
                    <li><a class="dropdown-item" href="#" data-filter="status" data-filter-value="Currently reading">Currently Reading</a></li>
                    <li><a class="dropdown-item" href="#" data-filter="status" data-filter-value="To read">To Read</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><h6 class="dropdown-header">Filter by Genre</h6></li>
                    <li><a class="dropdown-item" href="#" data-filter="genre" data-filter-value="Science Fiction">Science Fiction</a></li>
                    <li><a class="dropdown-item" href="#" data-filter="genre" data-filter-value="Magical Realism">Magical Realism</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" data-filter="all">Show All</a></li>
                </ul>
            </div>
            <button class="btn btn-primary ms-3" type="button" data-bs-toggle="modal" data-bs-target="#addModal">Add book</button>
        </div>

        <div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="modalLabel">Add a new book to log</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="addForm">
                        <div class="modal-body">
                            <div class="">
                                <label for="bookTitle" class="col-form-label">Title:</label>
                                <input type="text" class="form-control" id="bookTitle" placeholder="Book title" aria-label="Book title" required>
                            </div>
                            <div class="">
                                <label for="bookAuthor" class="col-form-label">Author:</label>
                                <input type="text" class="form-control" id="bookAuthor" placeholder="Book author" aria-label="Book author" required>
                            </div>
                            <div class="">
                                <label for="bookGenre" class="col-form-label">Genre:</label>
                                <input type="text" class="form-control" id="bookGenre" placeholder="Book genre" aria-label="Book genre" required>
                            </div>
                            <div class="">
                                <label for="bookStatus" class="col-form-label">Reading status:</label>
                                <select id="bookStatus" class="form-select">
                                    <option selected>To read</option>
                                    <option>Currently reading</option>
                                    <option>Read</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Add book</button>
                        </div>
                    </form>
                </div>
            </div>    
        </div>

        <div class="modal fade" id="removeModal" tabindex="-1" aria-labelledby="removeModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered"> 
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="removeModalLabel"> Remove ...... ?</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="close"></button>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button id="removeModalButton" type="submit" class="btn btn-danger">Delete book</button>
                    </div>
                </div>
            </div>
        </div>
       
        <div class= "row row-col row-cols-auto mx-auto g-2 mt-3">
            
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
